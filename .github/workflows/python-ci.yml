name: Python Code Quality Check (CI)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Lay code moi nhat tu kho ve may ao
        uses: actions/checkout@v4

      - name: Cai dat phien ban Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Tu dong chay kiem thu Unit Test
        run: |
          python -m unittest test_main.py